name: Python QA

on:
  workflow_call:
    inputs:
      python-min:
        description: Minimum Python version
        type: string
        default: "3.11"
      python-max:
        description: Maximum Python version
        type: string
        default: "3.14"
      full-os-matrix:
        description: Run full 3-OS matrix or Ubuntu-only
        type: boolean
        default: true
      run-package-check:
        description: Run the packaging gate
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  lint:
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(inputs.full-os-matrix && '["ubuntu-latest","windows-latest","macos-latest"]' || '["ubuntu-latest"]') }}
        python: ["${{ inputs.python-min }}", "${{ inputs.python-max }}"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python }}
      - name: Install uv when uv.lock is present
        if: ${{ hashFiles('uv.lock') != '' }}
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - name: Setup environment
        shell: bash
        if: runner.os != 'Windows'
        run: bash .github/scripts/setup.sh
      - name: Setup environment (Windows)
        shell: pwsh
        if: runner.os == 'Windows'
        run: .\.github\scripts\setup.ps1
      - name: Activate venv
        shell: bash
        if: runner.os != 'Windows'
        run: echo "${{ github.workspace }}/.venv/bin" >> "$GITHUB_PATH"
      - name: Activate venv (Windows)
        shell: pwsh
        if: runner.os == 'Windows'
        run: echo "${{ github.workspace }}\.venv\Scripts" | Out-File -FilePath $env:GITHUB_PATH -Append
      - name: Run lint check
        run: python .github/scripts/check_lint.py

  types:
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(inputs.full-os-matrix && '["ubuntu-latest","windows-latest","macos-latest"]' || '["ubuntu-latest"]') }}
        python: ["${{ inputs.python-min }}", "${{ inputs.python-max }}"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python }}
      - name: Install uv when uv.lock is present
        if: ${{ hashFiles('uv.lock') != '' }}
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - name: Setup environment
        shell: bash
        if: runner.os != 'Windows'
        run: bash .github/scripts/setup.sh
      - name: Setup environment (Windows)
        shell: pwsh
        if: runner.os == 'Windows'
        run: .\.github\scripts\setup.ps1
      - name: Activate venv
        shell: bash
        if: runner.os != 'Windows'
        run: echo "${{ github.workspace }}/.venv/bin" >> "$GITHUB_PATH"
      - name: Activate venv (Windows)
        shell: pwsh
        if: runner.os == 'Windows'
        run: echo "${{ github.workspace }}\.venv\Scripts" | Out-File -FilePath $env:GITHUB_PATH -Append
      - name: Run type check
        run: python .github/scripts/check_types.py

  tests:
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(inputs.full-os-matrix && '["ubuntu-latest","windows-latest","macos-latest"]' || '["ubuntu-latest"]') }}
        python: ["${{ inputs.python-min }}", "${{ inputs.python-max }}"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python }}
      - name: Install uv when uv.lock is present
        if: ${{ hashFiles('uv.lock') != '' }}
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - name: Setup environment
        shell: bash
        if: runner.os != 'Windows'
        run: bash .github/scripts/setup.sh
      - name: Setup environment (Windows)
        shell: pwsh
        if: runner.os == 'Windows'
        run: .\.github\scripts\setup.ps1
      - name: Activate venv
        shell: bash
        if: runner.os != 'Windows'
        run: echo "${{ github.workspace }}/.venv/bin" >> "$GITHUB_PATH"
      - name: Activate venv (Windows)
        shell: pwsh
        if: runner.os == 'Windows'
        run: echo "${{ github.workspace }}\.venv\Scripts" | Out-File -FilePath $env:GITHUB_PATH -Append
      - name: Run tests
        run: python .github/scripts/check_tests.py
      - name: Generate coverage badge data
        if: matrix.os == 'ubuntu-latest' && matrix.python == inputs.python-min
        shell: bash
        run: |
          COV=$(python -m coverage report --format=total 2>/dev/null || echo "0")
          if [ "$COV" -ge 90 ] 2>/dev/null; then COLOR="brightgreen"
          elif [ "$COV" -ge 70 ] 2>/dev/null; then COLOR="yellow"
          else COLOR="red"; fi
          mkdir -p badge
          echo "{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${COV}%\",\"color\":\"${COLOR}\"}" > badge/coverage.json
      - name: Upload coverage badge data
        if: matrix.os == 'ubuntu-latest' && matrix.python == inputs.python-min
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-badge
          path: badge/coverage.json
          retention-days: 1

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.python-min }}
      - name: Install uv when uv.lock is present
        if: ${{ hashFiles('uv.lock') != '' }}
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - name: Setup environment
        shell: bash
        run: bash .github/scripts/setup.sh
      - name: Activate venv
        shell: bash
        run: echo "${{ github.workspace }}/.venv/bin" >> "$GITHUB_PATH"
      - name: Run security check
        run: python .github/scripts/check_security.py

  spelling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.python-min }}
      - name: Install uv when uv.lock is present
        if: ${{ hashFiles('uv.lock') != '' }}
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - name: Setup environment
        shell: bash
        run: bash .github/scripts/setup.sh
      - name: Activate venv
        shell: bash
        run: echo "${{ github.workspace }}/.venv/bin" >> "$GITHUB_PATH"
      - name: Run spelling check
        run: python .github/scripts/check_spelling.py

  package:
    if: inputs.run-package-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.python-min }}
      - name: Install uv when uv.lock is present
        if: ${{ hashFiles('uv.lock') != '' }}
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - name: Setup environment
        shell: bash
        run: bash .github/scripts/setup.sh
      - name: Activate venv
        shell: bash
        run: echo "${{ github.workspace }}/.venv/bin" >> "$GITHUB_PATH"
      - name: Run package check
        run: python .github/scripts/check_package.py

  coverage-badge:
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    needs: [tests]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download coverage badge data
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: coverage-badge
      - name: Deploy badge to GitHub Pages
        uses: peaceiris/actions-gh-pages@47f197a2200bb9de68ba5f48fad1c088eb1c4a32 # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          keep_files: true

  ci-passed:
    if: always()
    needs: [lint, types, tests, security, spelling, package]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all checks passed
        shell: bash
        run: |
          echo "Lint: ${{ needs.lint.result }}"
          echo "Types: ${{ needs.types.result }}"
          echo "Tests: ${{ needs.tests.result }}"
          echo "Security: ${{ needs.security.result }}"
          echo "Spelling: ${{ needs.spelling.result }}"
          echo "Package: ${{ needs.package.result }}"

          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.types.result }}" != "success" ]] || \
             [[ "${{ needs.tests.result }}" != "success" ]] || \
             [[ "${{ needs.security.result }}" != "success" ]] || \
             [[ "${{ needs.spelling.result }}" != "success" ]] || \
             [[ "${{ needs.package.result }}" != "success" && "${{ needs.package.result }}" != "skipped" ]]; then
            echo "::error::One or more quality checks failed"
            exit 1
          fi
          echo "All quality checks passed"
