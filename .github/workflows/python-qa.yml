name: Python QA

on:
  workflow_call:
    inputs:
      python-min:
        description: Minimum Python version
        type: string
        default: "3.11"
      python-max:
        description: Maximum Python version
        type: string
        default: "3.14"
      full-os-matrix:
        description: Run full 3-OS matrix or Ubuntu-only
        type: boolean
        default: true
      run-package-check:
        description: Run the packaging gate
        type: boolean
        default: true

jobs:
  lint:
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(inputs.full-os-matrix && '["ubuntu-latest","windows-latest","macos-latest"]' || '["ubuntu-latest"]') }}
        python: ["${{ inputs.python-min }}", "${{ inputs.python-max }}"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python }}
      - name: Setup environment
        shell: bash
        if: runner.os != 'Windows'
        run: |
          if [ -f "uv.lock" ]; then
            curl -LsSf https://astral.sh/uv/install.sh | sh
            uv venv .venv
            uv sync
          else
            python -m venv .venv
            .venv/bin/python -m pip install --upgrade pip
            .venv/bin/python -m pip install -e ".[dev]"
          fi
      - name: Setup environment (Windows)
        shell: pwsh
        if: runner.os == 'Windows'
        run: |
          if (Test-Path "uv.lock") {
            irm https://astral.sh/uv/install.ps1 | iex
            uv venv .venv
            uv sync
          } else {
            python -m venv .venv
            .venv\Scripts\python -m pip install --upgrade pip
            .venv\Scripts\python -m pip install -e ".[dev]"
          }
      - name: Activate venv
        shell: bash
        if: runner.os != 'Windows'
        run: echo "${{ github.workspace }}/.venv/bin" >> "$GITHUB_PATH"
      - name: Activate venv (Windows)
        shell: pwsh
        if: runner.os == 'Windows'
        run: echo "${{ github.workspace }}\.venv\Scripts" | Out-File -FilePath $env:GITHUB_PATH -Append
      - name: Run lint check
        run: python scripts/check_lint.py

  types:
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(inputs.full-os-matrix && '["ubuntu-latest","windows-latest","macos-latest"]' || '["ubuntu-latest"]') }}
        python: ["${{ inputs.python-min }}", "${{ inputs.python-max }}"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python }}
      - name: Setup environment
        shell: bash
        if: runner.os != 'Windows'
        run: |
          if [ -f "uv.lock" ]; then
            curl -LsSf https://astral.sh/uv/install.sh | sh
            uv venv .venv
            uv sync
          else
            python -m venv .venv
            .venv/bin/python -m pip install --upgrade pip
            .venv/bin/python -m pip install -e ".[dev]"
          fi
      - name: Setup environment (Windows)
        shell: pwsh
        if: runner.os == 'Windows'
        run: |
          if (Test-Path "uv.lock") {
            irm https://astral.sh/uv/install.ps1 | iex
            uv venv .venv
            uv sync
          } else {
            python -m venv .venv
            .venv\Scripts\python -m pip install --upgrade pip
            .venv\Scripts\python -m pip install -e ".[dev]"
          }
      - name: Activate venv
        shell: bash
        if: runner.os != 'Windows'
        run: echo "${{ github.workspace }}/.venv/bin" >> "$GITHUB_PATH"
      - name: Activate venv (Windows)
        shell: pwsh
        if: runner.os == 'Windows'
        run: echo "${{ github.workspace }}\.venv\Scripts" | Out-File -FilePath $env:GITHUB_PATH -Append
      - name: Run type check
        run: python scripts/check_types.py

  tests:
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(inputs.full-os-matrix && '["ubuntu-latest","windows-latest","macos-latest"]' || '["ubuntu-latest"]') }}
        python: ["${{ inputs.python-min }}", "${{ inputs.python-max }}"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python }}
      - name: Setup environment
        shell: bash
        if: runner.os != 'Windows'
        run: |
          if [ -f "uv.lock" ]; then
            curl -LsSf https://astral.sh/uv/install.sh | sh
            uv venv .venv
            uv sync
          else
            python -m venv .venv
            .venv/bin/python -m pip install --upgrade pip
            .venv/bin/python -m pip install -e ".[dev]"
          fi
      - name: Setup environment (Windows)
        shell: pwsh
        if: runner.os == 'Windows'
        run: |
          if (Test-Path "uv.lock") {
            irm https://astral.sh/uv/install.ps1 | iex
            uv venv .venv
            uv sync
          } else {
            python -m venv .venv
            .venv\Scripts\python -m pip install --upgrade pip
            .venv\Scripts\python -m pip install -e ".[dev]"
          }
      - name: Activate venv
        shell: bash
        if: runner.os != 'Windows'
        run: echo "${{ github.workspace }}/.venv/bin" >> "$GITHUB_PATH"
      - name: Activate venv (Windows)
        shell: pwsh
        if: runner.os == 'Windows'
        run: echo "${{ github.workspace }}\.venv\Scripts" | Out-File -FilePath $env:GITHUB_PATH -Append
      - name: Run tests
        run: python scripts/check_tests.py

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ inputs.python-min }}
      - name: Setup environment
        shell: bash
        run: |
          if [ -f "uv.lock" ]; then
            curl -LsSf https://astral.sh/uv/install.sh | sh
            uv venv .venv
            uv sync
          else
            python -m venv .venv
            .venv/bin/python -m pip install --upgrade pip
            .venv/bin/python -m pip install -e ".[dev]"
          fi
      - name: Activate venv
        shell: bash
        run: echo "${{ github.workspace }}/.venv/bin" >> "$GITHUB_PATH"
      - name: Run security check
        run: python scripts/check_security.py

  spelling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ inputs.python-min }}
      - name: Setup environment
        shell: bash
        run: |
          if [ -f "uv.lock" ]; then
            curl -LsSf https://astral.sh/uv/install.sh | sh
            uv venv .venv
            uv sync
          else
            python -m venv .venv
            .venv/bin/python -m pip install --upgrade pip
            .venv/bin/python -m pip install -e ".[dev]"
          fi
      - name: Activate venv
        shell: bash
        run: echo "${{ github.workspace }}/.venv/bin" >> "$GITHUB_PATH"
      - name: Run spelling check
        run: python scripts/check_spelling.py

  package:
    if: inputs.run-package-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ inputs.python-min }}
      - name: Setup environment
        shell: bash
        run: |
          if [ -f "uv.lock" ]; then
            curl -LsSf https://astral.sh/uv/install.sh | sh
            uv venv .venv
            uv sync
          else
            python -m venv .venv
            .venv/bin/python -m pip install --upgrade pip
            .venv/bin/python -m pip install -e ".[dev]"
          fi
      - name: Activate venv
        shell: bash
        run: echo "${{ github.workspace }}/.venv/bin" >> "$GITHUB_PATH"
      - name: Run package check
        run: python scripts/check_package.py

  ci-passed:
    if: always()
    needs: [lint, types, tests, security, spelling, package]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all checks passed
        shell: bash
        run: |
          echo "Lint: ${{ needs.lint.result }}"
          echo "Types: ${{ needs.types.result }}"
          echo "Tests: ${{ needs.tests.result }}"
          echo "Security: ${{ needs.security.result }}"
          echo "Spelling: ${{ needs.spelling.result }}"
          echo "Package: ${{ needs.package.result }}"

          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.types.result }}" != "success" ]] || \
             [[ "${{ needs.tests.result }}" != "success" ]] || \
             [[ "${{ needs.security.result }}" != "success" ]] || \
             [[ "${{ needs.spelling.result }}" != "success" ]] || \
             [[ "${{ needs.package.result }}" != "success" && "${{ needs.package.result }}" != "skipped" ]]; then
            echo "::error::One or more quality checks failed"
            exit 1
          fi
          echo "All quality checks passed"
