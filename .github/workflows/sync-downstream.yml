name: Sync Downstream

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to sync
        required: true

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Sync template files to downstream repos
        env:
          GH_TOKEN: ${{ secrets.TEMPLATE_SYNC_PAT }}
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        shell: bash
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import re
          import subprocess
          import sys
          from pathlib import Path

          tag = os.environ["TAG"]
          template_root = Path(os.environ["GITHUB_WORKSPACE"])
          manifest_path = template_root / "sync-manifest.json"

          if not manifest_path.exists():
              print("::error::sync-manifest.json not found in repository root")
              sys.exit(1)

          with open(manifest_path) as f:
              manifest = json.load(f)

          repos = manifest.get("downstream_repos", [])
          files = manifest.get("files", [])
          if not repos:
              print("No downstream repos configured in sync-manifest.json")
              sys.exit(0)

          def run(cmd, **kwargs):
              print(f"  $ {' '.join(cmd) if isinstance(cmd, list) else cmd}")
              result = subprocess.run(cmd, capture_output=True, text=True, **kwargs)
              if result.returncode != 0:
                  print(f"  STDOUT: {result.stdout}")
                  print(f"  STDERR: {result.stderr}")
              return result

          def marker_preserve_copy(src: Path, dst: Path) -> None:
              """Copy src to dst, preserving content outside template marker regions in dst."""
              if not dst.exists():
                  # No existing file — straight copy
                  dst.parent.mkdir(parents=True, exist_ok=True)
                  dst.write_text(src.read_text())
                  return

              src_text = src.read_text()
              dst_text = dst.read_text()

              # Pattern matches: // #region Template:<name> ... // #endregion Template:<name>
              region_pattern = re.compile(
                  r"(//\s*#region\s+Template:\s*\S+.*?\n)(.*?)(//\s*#endregion\s+Template:)",
                  re.DOTALL,
              )

              # Build a map of region name -> new content from the source
              src_regions = {}
              for match in region_pattern.finditer(src_text):
                  region_header = match.group(1)
                  region_content = match.group(2)
                  # Extract region name from header
                  name_match = re.search(r"Template:\s*(\S+)", region_header)
                  if name_match:
                      src_regions[name_match.group(1)] = region_content

              def replace_region(match):
                  region_header = match.group(1)
                  region_footer = match.group(3)
                  name_match = re.search(r"Template:\s*(\S+)", region_header)
                  if name_match and name_match.group(1) in src_regions:
                      return region_header + src_regions[name_match.group(1)] + region_footer
                  return match.group(0)

              result_text = region_pattern.sub(replace_region, dst_text)
              dst.write_text(result_text)

          errors = []

          for repo in repos:
              print(f"\n{'='*60}")
              print(f"Syncing to {repo}")
              print(f"{'='*60}")

              work_dir = Path(f"/tmp/sync-{repo.replace('/', '-')}")
              branch_name = f"template-sync/{tag}"

              # Clone downstream repo
              result = run(
                  ["git", "clone", f"https://x-access-token:{os.environ['GH_TOKEN']}@github.com/{repo}.git", str(work_dir)]
              )
              if result.returncode != 0:
                  print(f"::error::Failed to clone {repo}")
                  errors.append(repo)
                  continue

              # Configure git
              run(["git", "config", "user.name", "template-sync[bot]"], cwd=work_dir)
              run(["git", "config", "user.email", "template-sync[bot]@users.noreply.github.com"], cwd=work_dir)

              # Create sync branch
              result = run(["git", "checkout", "-b", branch_name], cwd=work_dir)
              if result.returncode != 0:
                  print(f"::warning::Branch {branch_name} may already exist in {repo}, skipping")
                  errors.append(repo)
                  continue

              changed_files = []

              for file_mapping in files:
                  src_path = template_root / file_mapping["src"]
                  dst_path = work_dir / file_mapping["dest"]
                  mode = file_mapping.get("mode", "overwrite")

                  if not src_path.exists():
                      print(f"  Warning: source file {file_mapping['src']} not found, skipping")
                      continue

                  dst_path.parent.mkdir(parents=True, exist_ok=True)

                  if mode == "marker-preserve":
                      marker_preserve_copy(src_path, dst_path)
                  else:
                      # Default: overwrite
                      dst_path.write_text(src_path.read_text())

                  changed_files.append(file_mapping["dest"])
                  print(f"  Copied: {file_mapping['src']} -> {file_mapping['dest']} (mode={mode})")

              if not changed_files:
                  print(f"  No files changed for {repo}, skipping")
                  continue

              # Stage and commit
              run(["git", "add", "-A"], cwd=work_dir)

              # Check if there are actual changes
              diff_result = run(["git", "diff", "--cached", "--quiet"], cwd=work_dir)
              if diff_result.returncode == 0:
                  print(f"  No actual changes detected for {repo}, skipping")
                  continue

              commit_msg = f"chore: sync template files from python-template@{tag}"
              run(["git", "commit", "-m", commit_msg], cwd=work_dir)

              # Push branch
              result = run(["git", "push", "origin", branch_name], cwd=work_dir)
              if result.returncode != 0:
                  print(f"::error::Failed to push branch to {repo}")
                  errors.append(repo)
                  continue

              # Build file list for PR body
              file_list = "\n".join(f"- `{f}`" for f in changed_files)

              pr_body = f"""## Template Sync: {tag}

          This PR syncs template-managed files from [nwarila/python-template@{tag}](https://github.com/nwarila/python-template/releases/tag/{tag}).

          ### Changed files
          {file_list}

          ### Release notes
          See the [full release notes](https://github.com/nwarila/python-template/releases/tag/{tag}).

          ---
          🤖 Automated by [python-template sync](https://github.com/nwarila/python-template)"""

              # Create PR via gh CLI
              result = run(
                  [
                      "gh", "pr", "create",
                      "--repo", repo,
                      "--head", branch_name,
                      "--title", f"chore: template sync {tag}",
                      "--body", pr_body,
                  ]
              )
              if result.returncode != 0:
                  print(f"::error::Failed to create PR in {repo}")
                  errors.append(repo)
              else:
                  print(f"  PR created: {result.stdout.strip()}")

          if errors:
              print(f"\n::error::Sync failed for repos: {', '.join(errors)}")
              sys.exit(1)

          print("\nAll downstream repos synced successfully")
          PYEOF
